spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

# Le JWKS URI est surchargé programmatiquement par le test via @DynamicPropertySource
keycloak:
  jwks-uri: http://localhost:0/jwks          # placeholder — surchargé dans le test
  admin-api-base-url: http://localhost:0
  admin-client-id: test-client
  admin-client-secret: test-secret

# Config MinIO factice : permet la construction du bean S3Client sans MinIO réel.
# Le client AWS S3 ne fait aucun appel réseau à sa création (endpoint résolu à l'usage),
# donc les tests qui n'uploadent pas de fichier démarrent le contexte sans MinIO.
minio:
  endpoint: http://localhost:9000
  access-key: test-access-key
  secret-key: test-secret-key
  bucket: justificatifs-test
