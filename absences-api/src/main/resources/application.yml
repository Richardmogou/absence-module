# ─────────────────────────────────────────────
# Configuration commune (base)
# ─────────────────────────────────────────────
spring:
  application:
    name: absences-api
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    locations: classpath:db/migration

server:
  port: 8080
  max-http-request-header-size: 48KB

---
# ─────────────────────────────────────────────
# Profil DEV
# ─────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI}

keycloak:
  jwks-uri: ${KEYCLOAK_JWKS_URI}
  admin-api-base-url: ${KEYCLOAK_ADMIN_API_BASE_URL}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:justificatifs}

logging:
  level:
    com.banque.absences: DEBUG
    org.hibernate.SQL: DEBUG

